<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThingSpeak IoT Monitor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f6f8;
            color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .widget {
            background: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            text-align: center;
            width: 280px;
            border-top: 4px solid #0077b3; /* Oficiálna ThingSpeak modrá */
        }
        h2 {
            margin: 0 0 8px 0;
            font-size: 1rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #teplota {
            font-size: 3.5rem;
            font-weight: 700;
            color: #0077b3;
            margin: 12px 0;
        }
        .time {
            font-size: 0.75rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="widget">
        <h2>Teplota (Field 1)</h2>
        <div id="teplota">---</div>
        <div class="time" id="cas-aktualizacie">Načítavam...</div>
    </div>

    <script>
        // --- SEM VLOŽTE SVOJE ID KANÁLA ---
        const CHANNEL_ID = '1933847'; 

        // Oficiálna URL adresa pre verejný kanál (posledný záznam v JSON)
        const url = `https://thingspeak.com{CHANNEL_ID}/feeds/last.json`;

        async function ziskajDataZThingSpeak() {
            try {
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`ThingSpeak API chyba: ${response.status}`);
                }

                const data = await response.json();
                const hodnotaTeploty = data.field1;
                const casZaznamu = data.created_at;

                if (hodnotaTeploty !== null && hodnotaTeploty !== undefined) {
                    // Zaokrúhlenie hodnoty na jedno desatinné miesto
                    const zaokruhlene = parseFloat(hodnotaTeploty).toFixed(1);
                    document.getElementById('teplota').innerText = `${zaokruhlene} °C`;
                    
                    // Prevod UTC času z ThingSpeak na lokálny čas používateľa
                    const datum = new Date(casZaznamu);
                    document.getElementById('cas-aktualizacie').innerText = `Aktualizované: ${datum.toLocaleTimeString()}`;
                } else {
                    document.getElementById('teplota').innerText = '--';
                    document.getElementById('cas-aktualizacie').innerText = 'Field 1 neobsahuje dáta';
                }

            } catch (chyba) {
                console.error('Chyba komunikácie s ThingSpeak:', chyba);
                document.getElementById('teplota').innerText = 'Chyba';
                document.getElementById('cas-aktualizacie').innerText = 'Nepodarilo sa spojiť s API';
            }
        }

        // Prvé načítanie hneď po zobrazení stránky
        ziskajDataZThingSpeak();

        // Pravidelná aktualizácia každých 30 sekúnd (bezpečný interval pre ThingSpeak API)
        setInterval(ziskajDataZThingSpeak, 30000);
    </script>

</body>
</html>
