<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termostat - ThingSpeak</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; text-align: center; padding: 40px; }
        .card { background: white; max-width: 400px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 24px; }
        .temp-display { font-size: 48px; font-weight: bold; color: #007bff; margin: 20px 0; }
        .control-panel { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        input[type="number"] { width: 80px; padding: 10px; font-size: 18px; text-align: center; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; font-size: 18px; border-radius: 5px; cursor: pointer; margin-left: 10px; }
        button:hover { background: #218838; }
        .status { margin-top: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h1>Prehľad a Riadenie Teploty</h1>
    
    <!-- Zobrazenie aktuálnej teploty -->
    <div>Aktuálna teplota:</div>
    <div class="temp-display" id="currentTemp">-- °C</div>
    
    <!-- Riadenie teploty -->
    <div class="control-panel">
        <h3>Nastavenie termostatu</h3>
        <input type="number" id="targetTemp" value="22" step="0.5">
        <button onclick="sendTargetTemperature()">Odoslať</button>
        <div class="status" id="statusText">Načítavam dáta...</div>
    </div>
</div>

<script>
    // --- KONFIGURÁCIA THINGSPEAK (Doplňte vlastné údaje) ---
    const READ_CHANNEL_ID = 1933847; 
    const READ_API_KEY = QFQMC00DIAPXN2VG;
    const READ_FIELD = 'field1'; // Pole, kde máte aktuálnu teplotu

    const WRITE_CHANNEL_ID = 1933847; // Môže byť rovnaký kanál
    const WRITE_API_KEY = BBAP5VYM00BEL8XI;
    const WRITE_FIELD = 'field2'; // Pole, kam ukladáte požadovanú teplotu
    // -------------------------------------------------------

    // Funkcia na načítanie aktuálnej teploty z ThingSpeak
    async function fetchTemperature() {
        const url = `https://thingspeak.com{READ_CHANNEL_ID}/fields/${READ_FIELD}/last.json?api_key=${READ_API_KEY}`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data && data[READ_FIELD]) {
                const temp = parseFloat(data[READ_FIELD]).toFixed(1);
                document.getElementById('currentTemp').innerText = temp + ' °C';
                document.getElementById('statusText').innerText = 'Dáta aktualizované.';
            } else {
                document.getElementById('statusText').innerText = 'Chyba: Žiadne dáta v poli.';
            }
        } catch (error) {
            console.error('Chyba pri načítaní:', error);
            document.getElementById('statusText').innerText = 'Chyba pripojenia k ThingSpeak.';
        }
    }

    // Funkcia na odoslanie novej požadovanej teploty na ThingSpeak
    async function sendTargetTemperature() {
        const targetValue = document.getElementById('targetTemp').value;
        const url = `https://thingspeak.com{WRITE_API_KEY}&${WRITE_FIELD}=${targetValue}`;
        
        document.getElementById('statusText').innerText = 'Odosielam...';
        
        try {
            const response = await fetch(url);
            const result = await response.text();
            
            if (result !== '0') {
                document.getElementById('statusText').innerText = `Teplota ${targetValue}°C úspešne odoslaná!`;
            } else {
                document.getElementById('statusText').innerText = 'Chyba: ThingSpeak zamietol zápis (dodržte limit 15s).';
            }
        } catch (error) {
            console.error('Chyba pri zápise:', error);
            document.getElementById('statusText').innerText = 'Chyba pri odosielaní dát.';
        }
    }

    // Automatická aktualizácia teploty každých 15 sekúnd
    fetchTemperature();
    setInterval(fetchTemperature, 15000);
</script>

</body>
</html>
