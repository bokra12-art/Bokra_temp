<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Zobrazenie dát z ThingSpeak</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .data-box { padding: 15px; background: #f0f0f0; border-radius: 5px; display: inline-block; }
        .hodnota { font-size: 24px; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>

    <div class="data-box">
        <h3>Aktuálna hodnota:</h3>
        <!-- Sem sa zapíše hodnota z ThingSpeak -->
        <div id="moja-hodnota" class="hodnota">Načítavam...</div>
    </div>

    <script>
        // Nastavte vaše údaje z ThingSpeak
        const channelId = '1933847';
        const fieldNumber = '1'; // Číslo poľa (1-8)
        const apiKey = 'QFQMC00DIAPXN2VG'; // Vymaž, ak je kanál verejný

        // Poskladanie finálnej URL adresy
        const url = `https://thingspeak.com{channelId}/fields/${fieldNumber}/last.json?api_key=${apiKey}`;

        async function nacitajData() {
            try {
                // Odoslanie požiadavky na ThingSpeak
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('Chyba pri komunikácii s ThingSpeak');
                }
                
                // Prevedenie odpovede na JSON formát
                const data = await response.json();
                
                // Získanie konkrétnej hodnoty z poľa (napr. field1)
                const hodnota = data[`field${fieldNumber}`];
                
                // Vpísanie hodnoty do HTML elementu
                if (hodnota !== null && hodnota !== undefined) {
                    document.getElementById('moja-hodnota').innerText = hodnota;
                } else {
                    document.getElementById('moja-hodnota').innerText = 'Žiadne dáta';
                }
                
            } catch (error) {
                console.error('Chyba:', error);
                document.getElementById('moja-hodnota').innerText = 'Chyba načítania';
            }
        }

        // Spustenie funkcie ihneď po načítaní stránky
        nacitajData();

        // Voliteľné: Automatická aktualizácia každých 30 sekúnd
        setInterval(nacitajData, 30000);
    </script>

</body>
</html>
