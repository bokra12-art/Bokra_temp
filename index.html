<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktuálna Teplota z ThingSpeak</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .karta {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 250px;
        }
        h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #teplota {
            font-size: 3.5rem;
            font-weight: bold;
            color: #e74c3c;
            margin: 10px 0;
        }
        .status {
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="karta">
        <h2>Aktuálna teplota</h2>
        <div id="teplota">Načítavam...</div>
        <div class="status">Aktualizácia každých 30 sekúnd</div>
    </div>

    <script>
        // !!! SEM DAJTE SVOJE ČÍSLO KANÁLA !!!
        const CHANNEL_ID = "1933847"; 
        
        // Funkcia, ktorú ThingSpeak zavolá a odovzdá jej dáta
        function spracujData(data) {
            const hodnota = data.field1; // Zmeňte field1, ak máte teplotu v inom stĺpci
            const element = document.getElementById('teplota');
            
            if (hodnota !== undefined && hodnota !== null) {
                // Zaokrúhlenie na jedno desatinné miesto (voliteľné)
                const zformátovanáHodnota = parseFloat(hodnota).toFixed(1);
                element.innerText = zformátovanáHodnota + " °C";
            } else {
                element.innerText = "Bez dát";
            }
        }

        // Funkcia na vytvorenie bezpečnej požiadavky cez JSONP (obchádza CORS)
        function nacitajTeplotu() {
            // Odstránenie starého skriptu z predchádzajúceho načítania
            const starySkript = document.getElementById('thingspeak-skript');
            if (starySkript) {
                starySkript.remove();
            }

            // Vytvorenie nového script elementu
            const script = document.createElement('script');
            script.id = 'thingspeak-skript';
            
            // Posielame požiadavku s parametrom callback
            script.src = `https://thingspeak.com{CHANNEL_ID}/fields/1/last.json?callback=spracujData`;
            
            // Pridanie do stránky spustí načítanie dát
            document.body.appendChild(script);
        }

        // Prvé načítanie hneď po otvorení stránky
        nacitajTeplotu();

        // Automatické opakovanie každých 30 sekúnd
        setInterval(nacitajTeplotu, 30000);
    </script>

</body>
</html>
