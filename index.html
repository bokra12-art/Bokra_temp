<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termostat - ThingSpeak (JSONP)</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; text-align: center; padding: 40px; }
        .card { background: white; max-width: 400px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 24px; }
        .temp-display { font-size: 48px; font-weight: bold; color: #007bff; margin: 20px 0; }
        .control-panel { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        input[type="number"] { width: 80px; padding: 10px; font-size: 18px; text-align: center; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; font-size: 18px; border-radius: 5px; cursor: pointer; margin-left: 10px; }
        button:hover { background: #218838; }
        .status { margin-top: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h1>Prehľad a Riadenie Teploty</h1>
    
    <div>Aktuálna teplota:</div>
    <div class="temp-display" id="currentTemp">-- °C</div>
    
    <div class="control-panel">
        <h3>Nastavenie termostatu</h3>
        <input type="number" id="targetTemp" value="22" step="0.5">
        <button onclick="sendTargetTemperature()">Odoslať</button>
        <div class="status" id="statusText">Načítavam dáta...</div>
    </div>
</div>

<script>
    // --- KONFIGURÁCIA THINGSPEAK ---
    const READ_CHANNEL_ID = '1933847'; 
    const READ_API_KEY = 'QFQMC00DIAPXN2VG';
    const READ_FIELD = 'field1'; 

    const WRITE_API_KEY = 'BBAP5VYM00BEL8XI';
    const WRITE_FIELD = 'field2'; 
    // -------------------------------------------------------

    // 1. SPRACOVANIE DÁT PRE ČÍTANIE (JSONP Callback)
    function spracujNacitanuTeplotu(data) {
        let teploHodnota = null;

        if (data && data[READ_FIELD] !== undefined) {
            teploHodnota = data[READ_FIELD];
        } else if (data && data.feeds && data.feeds[0] && data.feeds[0][READ_FIELD] !== undefined) {
            teploHodnota = data.feeds[0][READ_FIELD];
        }

        if (teploHodnota !== null && teploHodnota !== undefined && teploHodnota !== "") {
            const temp = parseFloat(teploHodnota).toFixed(1);
            document.getElementById('currentTemp').innerText = temp + ' °C';
            document.getElementById('statusText').innerText = 'Dáta aktualizované.';
        } else {
            document.getElementById('statusText').innerText = 'Chyba: Kanál zatiaľ nemá žiadne uložené dáta.';
        }
        
        const starySkript = document.getElementById('ts-read-script');
        if (starySkript) starySkript.remove();
    }

    // Funkcia na načítanie teploty cez JSONP script tag
    function fetchTemperature() {
        const starySkript = document.getElementById('ts-read-script');
        if (starySkript) starySkript.remove();

        const script = document.createElement('script');
        script.id = 'ts-read-script';
        
        // OPRAVENÉ: Opravená URL adresa pre správne volanie API kanála
        script.src = `https://thingspeak.com{READ_CHANNEL_ID}/fields/1/last.json?api_key=${READ_API_KEY}&callback=spracujNacitanuTeplotu`;
        
        document.body.appendChild(script);
    }

    // 2. SPRACOVANIE DÁT PRE ZÁPIS (JSONP Callback)
    function spracujZapisTeploty(result) {
        if (result && (result > 0 || (result.entry_id && result.entry_id > 0))) {
            const targetValue = document.getElementById('targetTemp').value;
            document.getElementById('statusText').innerText = `Teplota ${targetValue}°C úspešne odoslaná!`;
        } else {
            document.getElementById('statusText').innerText = 'Chyba: ThingSpeak zamietol zápis (limit 15s).';
        }

        const starySkript = document.getElementById('ts-write-script');
        if (starySkript) starySkript.remove();
    }

    // Funkcia na odoslanie teploty cez JSONP script tag
    function sendTargetTemperature() {
        const targetValue = document.getElementById('targetTemp').value;
        document.getElementById('statusText').innerText = 'Odosielam...';

        const starySkript = document.getElementById('ts-write-script');
        if (starySkript) starySkript.remove();

        const script = document.createElement('script');
        script.id = 'ts-write-script';
        
        // OPRAVENÉ: Opravená URL adresa pre zápis dát do feedu
        script.src = `https://thingspeak.com{WRITE_API_KEY}&${WRITE_FIELD}=${targetValue}&callback=spracujZapisTeploty`;
        
        document.body.appendChild(script);
    }

    // Spustenie automatickej aktualizácie
    fetchTemperature();
    setInterval(fetchTemperature, 15000);
</script>

</body>
</html>
